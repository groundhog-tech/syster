name: Build CLI for All Platforms
on: [workflow_dispatch]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      # 第一步：装个编译器（注意：这里连 checkout 都不写了，根本不看你仓库里有什么）
      - uses: dtolnay/rust-toolchain@stable
      
      # 第二步：直接去 Rust 官方中央仓库下载源码并原地编译！
      # --root ./my_output 会让它把编译好的文件乖乖放进 my_output/bin 文件夹里
      - name: Remote Download & Build
        run: cargo install syster-cli --root ./my_output
          
      # 第三步：收割战利品，打包带走！
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: syster-cli-${{ matrix.os }}
          path: my_output/bin/*
