name: build-syster-cli

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            exe: syster
          - os: windows-latest
            exe: syster.exe
          - os: macos-latest
            exe: syster

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodules present
        shell: bash
        run: |
          set -euo pipefail
          test -f base/Cargo.toml
          test -f cli/Cargo.toml
          git submodule status --recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # 关键：用 Cargo 的 paths override，把 syster-base 依赖指向本仓库的 base/ 子模块
      - name: Configure cargo path overrides
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          paths = ["base"]
          EOF

      - name: Build CLI (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path cli/Cargo.toml --features interchange

      - name: Collect artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "cli/target/release/${{ matrix.exe }}" dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: syster-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error