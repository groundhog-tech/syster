name: Build CLI for All Platforms
on: [workflow_dispatch]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 🚨 关键修复：关闭连坐机制，允许其他平台继续跑
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      # 拉取最新的稳定版 Rust 编译器
      - uses: dtolnay/rust-toolchain@stable 
      
      # 🚨 关键修复：用 -p 指定包名，而不是指定死路径
      - name: Build syster-cli
        run: cargo build --release -p syster-cli 
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: syster-cli-${{ matrix.os }}
          path: target/release/syster-cli*
